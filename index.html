<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordle · Python Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Berkeley+Mono&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #0e0e0f;
      --surface:       #161618;
      --border:        #2a2a2e;
      --text:          #e8e6e1;
      --muted:         #5a5a62;
      --green:         #538d4e;
      --green-bright:  #6aaf63;
      --yellow:        #b59f3b;
      --yellow-bright: #d4b84a;
      --font-mono:     'Berkeley Mono', 'Fira Code', monospace;
      --font-serif:    'DM Serif Display', Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
    }

    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    header {
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 { font-family: var(--font-serif); font-size: 1.8rem; font-weight: 400; }
    header h1 em { font-style: italic; color: var(--green-bright); }
    .tagline { color: var(--muted); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    .panel { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .panel + .panel { border-left: 1px solid var(--border); }

    .panel-bar {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #28c840; }
    .panel-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-left: 4px; }

    /* ── terminal ── */
    #term-scroll { flex: 1; overflow-y: auto; padding: 16px 20px; background: var(--bg); }
    #output { font-size: 13px; line-height: 1.6; }

    /* plain text output lines */
    .out-line { white-space: pre-wrap; word-break: break-word; display: block; }
    .err-line { color: #ff6b6b; display: block; }

    /* ── CSS tile board ── */
    .wordle-board {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 8px 0;
    }
    .wordle-row {
      display: flex;
      gap: 6px;
    }
    .tile {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      font-family: var(--font-mono);
      border-radius: 3px;
      text-transform: uppercase;
      transition: background .1s;
    }
    .tile-empty  { background: #1c1c1e; color: #444; }
    .tile-green  { background: var(--green);  color: #fff; }
    .tile-yellow { background: var(--yellow); color: #111; }
    .tile-gray   { background: #3a3a3c;       color: #ccc; }

    /* ── keyboard ── */
    .kbd-wrap { margin: 6px 0 4px; }
    .kbd-row  { display: flex; gap: 5px; margin-bottom: 5px; }
    .kbd-key  {
      min-width: 26px;
      height: 32px;
      padding: 0 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      border-radius: 3px;
      background: #2a2a2e;
      color: var(--text);
    }
    .kbd-key.k-green  { background: var(--green);  color: #fff; }
    .kbd-key.k-yellow { background: var(--yellow); color: #111; }
    .kbd-key.k-gray   { background: #1c1c1e;       color: #555; }

    /* ── loading ── */
    #loader {
      color: var(--muted); font-size: 12px;
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0 12px;
    }
    .spin {
      width: 11px; height: 11px;
      border: 2px solid var(--border);
      border-top-color: var(--green-bright);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── input ── */
    .input-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .prompt { color: var(--green-bright); }
    #guess-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--font-mono); font-size: 13px;
      letter-spacing: .1em; text-transform: uppercase;
      caret-color: var(--green-bright);
    }
    #guess-input::placeholder { color: var(--muted); text-transform: none; letter-spacing: 0; }
    #guess-input:disabled { opacity: .4; }
    #sub-btn {
      background: var(--green); color: #fff; border: none;
      padding: 5px 14px; border-radius: 4px;
      font-family: var(--font-mono); font-size: 12px;
      cursor: pointer; transition: background .15s;
    }
    #sub-btn:hover:not(:disabled) { background: var(--green-bright); }
    #sub-btn:disabled { background: var(--muted); cursor: not-allowed; }

    /* ── status ── */
    #status-bar {
      padding: 5px 20px; border-top: 1px solid var(--border);
      background: var(--surface); font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    #s-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .3s; }
    #s-dot.ready { background: var(--green-bright); }
    #s-dot.busy  { background: var(--yellow-bright); }
    #s-dot.error { background: #ff6b6b; }

    /* ── source panel ── */
    #src-scroll { flex: 1; overflow-y: auto; background: var(--bg); }
    #src-scroll pre {
      margin: 0; padding: 16px 20px;
      font-size: 12px; line-height: 1.65; tab-size: 4; white-space: pre;
    }
    .kw { color: #c792ea; }
    .fn { color: #82aaff; }
    .st { color: #c3e88d; }
    .cm { color: var(--muted); font-style: italic; }
    .nm { color: var(--yellow-bright); }

    @media (max-width: 700px) {
      .split { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .panel + .panel { border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <h1>Wordle · <em>Python</em> Edition</h1>
    <span class="tagline">Pyodide · real Python in the browser</span>
  </header>

  <div class="split">
    <!-- LEFT: terminal -->
    <div class="panel">
      <div class="panel-bar">
        <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
        <span class="panel-label">terminal — wordle.py</span>
      </div>
      <div id="term-scroll">
        <div id="loader"><div class="spin"></div>Loading Python (Pyodide ~8 MB)…</div>
        <div id="output"></div>
      </div>
      <div id="status-bar">
        <div id="s-dot"></div><span id="s-txt">Initialising…</span>
      </div>
      <div class="input-row">
        <span class="prompt">›</span>
        <input id="guess-input" type="text" maxlength="5"
               placeholder="5-letter word…" autocomplete="off" spellcheck="false" disabled>
        <button id="sub-btn" disabled>Enter</button>
      </div>
    </div>

    <!-- RIGHT: source -->
    <div class="panel">
      <div class="panel-bar">
        <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
        <span class="panel-label">source — wordle.py</span>
      </div>
      <div id="src-scroll"><pre id="src-code"></pre></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script>
  // ── word list ─────────────────────────────────────────────────────────────────
  const WORDS = [
    "about","above","abuse","actor","acute","admit","adopt","adult","after","again",
    "agent","agree","ahead","alarm","album","alert","alike","alive","alley","allow",
    "alone","along","alter","angel","anger","angle","angry","ankle","apart","apple",

    "audio","audit","avoid","award","aware","baker","bases","basic","basis","batch",
    "beach","began","begin","being","below","bench","birth","black","blade","blame",
    "blank","blast","blaze","bleed","blend","bless","blind","block","blood","bloom",
    "board","bonus","booth","bound","brace","brain","brand","brave","bread","break",
    "breed","brick","bride","brief","bring","broad","broke","brown","brush","buddy",
    "build","built","burst","buyer","cabin","candy","carry","catch","cause","chain",
    "chair","chaos","charm","chart","chase","cheap","check","chess","chest","chief",
    "child","chill","chord","civic","civil","claim","clash","class","clean","clear",
    "click","cliff","climb","clock","clone","close","cloud","coast","comet","coral",
    "could","count","court","cover","crack","craft","crane","crash","crazy","cream",
    "creek","crime","crisp","cross","crowd","crown","cruel","crush","crust","curve",
    "cycle","daily","dance","death","decay","delay","delta","dense","depth","devil",
    "digit","dirty","dodge","doubt","dough","draft","drain","drama","dream","dress",
    "drill","drink","drive","drown","drunk","eagle","earth","eight","elect","elite",
    "empty","enemy","enjoy","enter","equal","error","essay","event","every","exact",
    "exist","extra","fable","faith","false","fancy","fatal","fault","feast","fence",
    "ferry","fever","fiber","field","fifth","fifty","fight","final","first","fixed",
    "flame","flash","fleet","flesh","float","flood","floor","flour","fluid","flush",
    "focus","force","forge","forth","forum","found","frame","fraud","fresh","front",
    "froze","fruit","fully","funny","ghost","given","glass","globe","gloom","glory",
    "glove","grace","grade","grain","grand","grant","graph","grasp","grass","grave",
    "great","greed","green","grief","grind","groan","groom","gross","group","grove",
    "grown","guard","guess","guest","guide","guilt","habit","harsh","haste","heart",
    "heavy","hedge","herbs","hobby","honey","horse","hotel","house","human","humor",
    "hurry","ideal","image","imply","index","inner","input","issue","ivory","jewel",
    "joint","judge","juice","juicy","karma","knack","knife","knock","known","label",
    "large","laser","later","laugh","layer","learn","lease","leave","legal","lemon",
    "level","light","limit","linen","liver","lobby","local","lodge","logic","loose",
    "lower","lucky","lunar","lyric","magic","major","maker","manor","maple","match",
    "mayor","media","mercy","merge","merit","metal","meter","might","mimic","minor",
    "minus","mixed","model","money","month","moral","motif","motor","mount","mouse",
    "mouth","movie","muddy","music","naive","nasty","naval","nerve","never","night",
    "noble","noise","north","noted","novel","nurse","ocean","offer","often","olive",
    "opera","orbit","order","other","outer","owned","oxide","ozone","paint","panic",
    "paper","party","pasta","patch","pause","peace","pearl","penny","phase","phone",
    "photo","piano","pixel","pizza","place","plain","plane","plant","plate","pluck",
    "point","polar","pound","power","press","price","pride","prime","print","prior",
    "prize","probe","proof","prose","proud","prove","pulse","punch","pupil","purse",
    "queen","quest","quick","quiet","quota","quote","radar","radio","rainy","rally",
    "ranch","range","rapid","ratio","reach","react","ready","realm","rebel","refer",
    "reign","relax","relay","reply","rider","ridge","rifle","right","rigid","risky",
    "rival","river","rivet","robin","robot","rocky","rough","round","route","royal",
    "rugby","ruler","rural","saint","salad","sauce","scale","scene","scope","score",
    "scout","sense","setup","seven","shade","shake","shall","shame","shape","share",
    "shark","sharp","shelf","shell","shift","shine","shirt","shock","short","shout",
    "sight","silly","since","skill","skull","slate","sleep","slice","slide","slope",
    "small","smart","smell","smile","smoke","snake","solve","sorry","south","space",
    "spark","speak","speed","spell","spend","spill","spine","spite","split","spoke",
    "spoon","sport","spray","squad","stack","staff","stage","stain","stair","stake",
    "stamp","stand","stark","start","state","steal","steam","steel","steep","steer",
    "stern","stick","stiff","still","stock","stone","stood","store","storm","story",
    "stove","strap","stray","strip","stuck","study","style","sugar","suite","sunny",
    "super","surge","swear","sweep","sweet","swift","swipe","sword","table","taken",
    "taste","teach","tears","teeth","tempo","tense","tenth","thick","thing","think",
    "third","thorn","those","three","threw","throw","thumb","tiger","tight","timer",
    "tired","title","today","token","topic","total","touch","tough","tower","toxic",
    "track","trade","trail","train","trait","trash","treat","trend","trial","tribe",
    "trick","tried","troop","trout","truce","truck","truly","trunk","trust","truth",
    "tumor","tweak","twice","twist","uncle","under","unify","union","unite","until",
    "upper","upset","urban","usage","usual","utter","vague","valid","value","valve",
    "vapor","vault","verse","video","vigor","viral","virus","visit","vista","vital",
    "vivid","vocal","voice","voter","wager","waste","watch","water","weave","wedge",
    "weird","whale","wheat","wheel","where","which","while","white","whole","whose",
    "witch","woman","women","world","worry","worth","would","wound","wrath","write",
    "wrong","yacht","yield","young","youth","zebra"
  ];

  // ── Python source ─────────────────────────────────────────────────────────────
  // Instead of printing multi-line ASCII boxes, Python emits structured markers:
  //   ##BOARD## row0_letter:state,letter:state,...|row1_...|...
  //   ##KBD##   letter:state,...
  //   ##MSG##   text
  // JavaScript intercepts these and renders proper CSS tiles.
  const PY = `
import random

WORDS     = []   # injected by JS before first run
answer    = ""
guesses   = []
game_over = False

def score_guess(guess, answer):
    result    = [None] * 5
    remaining = list(answer)
    for i, (g, a) in enumerate(zip(guess, answer)):
        if g == a:
            result[i] = "green"
            remaining[i] = None
    for i, g in enumerate(guess):
        if result[i]: continue
        if g in remaining:
            result[i] = "yellow"
            remaining[remaining.index(g)] = None
        else:
            result[i] = "gray"
    return result

def emit_board(guesses, answer):
    rows = []
    for i in range(6):
        if i < len(guesses):
            scores = score_guess(guesses[i], answer)
            cells  = ",".join(f"{l}:{s}" for l, s in zip(guesses[i], scores))
        else:
            cells = " :empty, :empty, :empty, :empty, :empty"
        rows.append(cells)
    print("##BOARD##" + "|".join(rows))

def emit_keyboard(guesses, answer):
    state = {}
    for g in guesses:
        for ch, s in zip(g, score_guess(g, answer)):
            if s == "green": state[ch] = "green"
            elif s == "yellow" and state.get(ch) != "green": state[ch] = "yellow"
            elif ch not in state: state[ch] = "gray"
    pairs = ",".join(f"{ch}:{state.get(ch,'none')}" for ch in "abcdefghijklmnopqrstuvwxyz")
    print("##KBD##" + pairs)

def start_game():
    global answer, guesses, game_over
    answer    = random.choice(WORDS)
    guesses   = []
    game_over = False
    print("##MSG##\\u2554\\u2550 W O R D L E \\u2550\\u2557  Guess the 5-letter word in 6 tries.")
    print("##MSG##\\U0001f7e9 right spot  \\U0001f7e8 wrong spot  \\u2b1b not in word")
    emit_board(guesses, answer)
    emit_keyboard(guesses, answer)

def submit_guess(raw):
    global guesses, game_over
    raw = raw.strip().lower()
    if len(raw) != 5:
        print("##MSG##\\u26a0  Please enter exactly 5 letters."); return
    if not raw.isalpha():
        print("##MSG##\\u26a0  Letters only."); return
    if raw not in WORDS:
        print(f"##MSG##\\u26a0  '{raw.upper()}' not in word list."); return
    guesses.append(raw)
    emit_board(guesses, answer)
    emit_keyboard(guesses, answer)
    if raw == answer:
        game_over = True
        labels = ["Genius!","Magnificent!","Impressive!","Splendid!","Great!","Phew!"]
        print(f"##MSG##\\U0001f389  {labels[len(guesses)-1]}  ({len(guesses)}/6)  —  type  new  to play again.")
    elif len(guesses) >= 6:
        game_over = True
        print(f"##MSG##\\U0001f614  The word was {answer.upper()}  —  type  new  to play again.")
`;

  // ── render helpers ────────────────────────────────────────────────────────────

  function renderBoard(data) {
    // data = "m:green,a:gray,g:gray,i:yellow,c:green|...|..."
    const rows = data.split('|');
    const board = document.createElement('div');
    board.className = 'wordle-board';
    for (const row of rows) {
      const rowEl = document.createElement('div');
      rowEl.className = 'wordle-row';
      const cells = row.split(',');
      for (const cell of cells) {
        const [letter, state] = cell.trim().split(':');
        const tile = document.createElement('div');
        tile.className = `tile tile-${state || 'empty'}`;
        tile.textContent = (letter || '').trim().toUpperCase();
        rowEl.appendChild(tile);
      }
      board.appendChild(rowEl);
    }
    return board;
  }

  function renderKeyboard(data) {
    // data = "a:green,b:none,c:yellow,..."
    const stateMap = {};
    for (const pair of data.split(',')) {
      const [ch, s] = pair.split(':');
      stateMap[ch] = s;
    }
    const rows = ['qwertyuiop', 'asdfghjkl', 'zxcvbnm'];
    const wrap = document.createElement('div');
    wrap.className = 'kbd-wrap';
    for (const row of rows) {
      const rowEl = document.createElement('div');
      rowEl.className = 'kbd-row';
      for (const ch of row) {
        const key = document.createElement('div');
        const s = stateMap[ch] || 'none';
        key.className = 'kbd-key' + (s !== 'none' ? ` k-${s}` : '');
        key.textContent = ch.toUpperCase();
        rowEl.appendChild(key);
      }
      wrap.appendChild(rowEl);
    }
    return wrap;
  }

  function renderMsg(text) {
    const el = document.createElement('div');
    el.className = 'out-line';
    el.textContent = text;
    return el;
  }

  // ── output dispatcher ─────────────────────────────────────────────────────────
  const outputEl = document.getElementById('output');
  const loaderEl = document.getElementById('loader');
  const inputEl  = document.getElementById('guess-input');
  const btnEl    = document.getElementById('sub-btn');
  const sDot     = document.getElementById('s-dot');
  const sTxt     = document.getElementById('s-txt');
  const termEl   = document.getElementById('term-scroll');

  // Pending board/kbd — we collect both before rendering so they appear together
  let _pendingBoard = null;
  let _buf = '';

  function flush() {
    if (_buf) {
      dispatch(_buf);
      _buf = '';
    }
  }

  function dispatch(line) {
    line = line.replace(/\n$/, '');
    if (!line) return;

    if (line.startsWith('##BOARD##')) {
      _pendingBoard = line.slice(9);
    } else if (line.startsWith('##KBD##')) {
      // Render board + keyboard together as one block
      const wrap = document.createElement('div');
      wrap.style.marginBottom = '12px';
      if (_pendingBoard) { wrap.appendChild(renderBoard(_pendingBoard)); _pendingBoard = null; }
      wrap.appendChild(renderKeyboard(line.slice(7)));
      outputEl.appendChild(wrap);
    } else if (line.startsWith('##MSG##')) {
      outputEl.appendChild(renderMsg(line.slice(7)));
    } else {
      // plain text fallback
      const el = document.createElement('div');
      el.className = 'out-line';
      el.textContent = line;
      outputEl.appendChild(el);
    }
    termEl.scrollTop = termEl.scrollHeight;
  }

  function printErr(msg) {
    const el = document.createElement('div');
    el.className = 'err-line';
    el.textContent = '⚠ ' + msg;
    outputEl.appendChild(el);
    termEl.scrollTop = termEl.scrollHeight;
  }

  function setStatus(cls, msg) {
    sDot.className = cls;
    sTxt.textContent = msg;
  }

  // ── syntax highlight ──────────────────────────────────────────────────────────
  function highlight(code) {
    code = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return code
            .replace(/#[^\n]*/g, m => `<span class="cm">${m}</span>`)
            .replace(/("""[\s\S]*?"""|"[^"\n]*"|'[^'\n]*')/g, m => `<span class="st">${m}</span>`)
            .replace(/\b(def|return|import|from|if|elif|else|for|while|in|not|and|or|is|None|True|False|global|try|except|raise|pass|break|continue)\b/g,
                    '<span class="kw">$1</span>')
            .replace(/\b(print|len|list|str|int|range|zip|enumerate|sorted|random|input)\b/g,
                    '<span class="fn">$1</span>')
            .replace(/\b(\d+)\b/g, '<span class="nm">$1</span>');
  }

  document.getElementById('src-code').innerHTML = highlight(PY);

  // ── Pyodide init ──────────────────────────────────────────────────────────────
  let py = null;

  async function init() {
    setStatus('busy', 'Loading Pyodide…');
    try {
      py = await loadPyodide();
    } catch (e) {
      loaderEl.innerHTML = '<span class="err-line">⚠ Could not load Pyodide — are you online?</span>';
      setStatus('error', 'Pyodide load failed');
      return;
    }

    // Capture stdout line by line
    py.setStdout({
      raw(charCode) {
        const ch = String.fromCharCode(charCode);
        if (ch === '\n') { dispatch(_buf); _buf = ''; }
        else { _buf += ch; }
      }
    });
    py.setStderr({ batched(s) { printErr(s); } });

    // Inject word list
    py.globals.set('WORDS', py.toPy(WORDS));

    // Define functions
    try {
      await py.runPythonAsync(PY);
    } catch (e) {
      printErr('Python init error: ' + e.message);
      setStatus('error', 'Python error');
      loaderEl.style.display = 'none';
      return;
    }

    // Start game
    try {
      await py.runPythonAsync('start_game()');
      flush();
    } catch (e) {
      printErr('start_game() error: ' + e.message);
    }

    loaderEl.style.display = 'none';
    inputEl.disabled = false;
    btnEl.disabled   = false;
    inputEl.focus();
    setStatus('ready', 'Python running · Pyodide 0.25.1');
  }

  // ── submit ────────────────────────────────────────────────────────────────────
  async function submit() {
    const raw = inputEl.value.trim().toLowerCase();
    if (!raw || !py) return;
    inputEl.value = '';

    const label = document.createElement('div');
    label.className = 'out-line';
    label.style.color = 'var(--muted)';
    label.textContent = `› ${raw.toUpperCase()}`;
    outputEl.appendChild(label);

    inputEl.disabled = true;
    btnEl.disabled   = true;
    setStatus('busy', 'Running…');

    try {
      const cmd = raw === 'new' ? 'start_game()' : `submit_guess(${JSON.stringify(raw)})`;
      await py.runPythonAsync(cmd);
      flush();
    } catch (e) {
      printErr('Error: ' + e.message);
    }

    const over = py.globals.get('game_over');
    inputEl.disabled = false;
    btnEl.disabled   = false;
    inputEl.focus();
    setStatus('ready', over ? 'Game over — type "new" to restart' : 'Python running · Pyodide 0.25.1');
  }

  btnEl.addEventListener('click', submit);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

  init();
</script>
</body>
</html>
